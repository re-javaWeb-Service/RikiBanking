spring.profiles.active=test

spring.datasource.url=jdbc:h2:mem:rikkei_banking_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.h2.console.enabled=false

app.jwt.secret=change-this-secret-to-at-least-256-bits-before-production
app.jwt.access-token-expiration-seconds=3600
app.jwt.refresh-token-expiration-seconds=86400

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
